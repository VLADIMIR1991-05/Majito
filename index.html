<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fahrenheit: Guardianes de la Chispa</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <section class="stage" aria-label="Fahrenheit: Guardianes de la Chispa">
      <canvas id="scene" width="1280" height="720" aria-hidden="true"></canvas>
      <div class="stage-vignette"></div>

      <header class="topbar">
        <div>
          <p class="kicker">Reto de lectura interactivo</p>
          <h1>Fahrenheit: Guardianes de la Chispa</h1>
        </div>
        <div class="toolbar" aria-label="Controles del juego">
          <button id="soundBtn" class="icon-button" type="button" title="Sonido" aria-label="Activar o apagar sonido">S</button>
          <button id="restartBtn" class="icon-button" type="button" title="Reiniciar" aria-label="Reiniciar juego">R</button>
        </div>
      </header>

      <section class="scoreboard" aria-label="Marcador">
        <div class="meter"><span>Aciertos</span><strong id="scoreVal">0</strong><i id="scoreBar"></i></div>
        <div class="meter"><span>Racha</span><strong id="streakVal">0</strong><i id="streakBar"></i></div>
        <div class="meter"><span>Pistas</span><strong id="hintsVal">3</strong><i id="hintsBar"></i></div>
        <div class="meter"><span>Nivel</span><strong id="levelVal">1</strong><i id="levelBar"></i></div>
      </section>

      <section id="panel" class="panel" aria-live="polite">
        <p id="chapter" class="chapter"></p>
        <h2 id="title"></h2>
        <p id="text"></p>
        <p id="goal" class="goal"></p>
        <div id="challenge" class="challenge"></div>
        <p id="feedback" class="feedback" role="status"></p>
        <div class="actions">
          <button id="hintBtn" class="secondary" type="button">Pista</button>
          <button id="checkBtn" class="primary" type="button">Comprobar</button>
        </div>
      </section>

      <aside class="notebook" aria-label="Logros">
        <h2>Cartas ganadas</h2>
        <ul id="cardsList"></ul>
      </aside>

      <section id="reward" class="reward" aria-live="polite" aria-label="Carta desbloqueada">
        <div class="reward-card">
          <button id="closeReward" class="close-button" type="button" aria-label="Continuar">X</button>
          <div id="rewardImage" class="reward-image"></div>
          <p id="rewardLabel" class="reward-label"></p>
          <h2 id="rewardTitle"></h2>
          <p id="rewardQuote" class="reward-quote"></p>
          <button id="nextBtn" class="primary" type="button">Siguiente reto</button>
        </div>
      </section>
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
